<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1C2128"/>
      <stop offset="1" stop-color="#111318"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4AA3FF"/>
      <stop offset="1" stop-color="#57C97A"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="frameFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A424E"/>
      <stop offset="1" stop-color="#2E353F"/>
    </linearGradient>
  </defs>

  <!-- タイル(角丸スクエア, 余白96, 半径≈22.4%) -->
  <rect x="96" y="96" width="832" height="832" rx="186" fill="url(#tile)"/>
  <rect x="96" y="96" width="832" height="832" rx="186" fill="url(#gloss)"/>

